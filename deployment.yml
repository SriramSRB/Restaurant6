apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-deployment 
  labels:
    project: restaurant
spec:
  replicas: 2
  strategy: 
    type: RollingUpdate
  selector:
    matchLabels:
      project: restaurant
  template:
    metadata:
      labels:
        project: restaurant
    spec:
      containers:
        - name: restaurant-container 
          image: sriramsrb/restaurant:latest
          imagePullPolicy: Never
          ports: 
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

---

apiVersion: v1
kind: Service
metadata:
  name: restaurant-service 
  labels:
    project: restaurant
spec:
  type: NodePort
  selector:
    project: restaurant
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080